<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#0f6e56">
<title>מחירון דירות — ראשון לציון</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f5f3; --card:#ffffff; --line:rgba(0,0,0,.10); --line2:rgba(0,0,0,.18);
    --tx:#1b1b19; --tx2:#6a6a64; --tx3:#9a9a93;
    --avail:#0f6e56; --avail-bg:#e1f5ee; --avail-bd:#1d9e75;
    --hold:#854f0b; --hold-bg:#faeeda; --hold-bd:#ef9f27;
    --sold:#a32d2d; --sold-bg:#fceaea; --sold-bd:#e24b4a;
    --none-tx:#777; --none-bg:#eeeeec; --none-bd:#cfcfca;
    --info:#185fa5; --info-bg:#e6f1fb;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--tx);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans Hebrew",sans-serif;
    font-size:15px; line-height:1.5;}
  .wrap{max-width:560px; margin:0 auto; padding:12px 12px 40px;}
  .brand{display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px 14px; margin-bottom:10px;}
  .brand .logo-img{height:36px; width:auto; display:none;}
  .brand-davidson{font-family:Georgia,"Times New Roman",serif; font-size:20px; font-weight:500; letter-spacing:3px; color:var(--tx);}
  .brand-forever-chip{display:flex; align-items:center; background:#16302a; border-radius:10px; padding:6px 14px;}
  .brand-forever-chip .logo-img{height:30px;}
  .brand-forever{font-family:'Dancing Script',cursive; font-size:28px; line-height:1; color:#f0e6d6;}
  header{text-align:center; padding:2px 0 10px;}
  header h1{font-size:18px; font-weight:600; margin:0;}
  header .sub{font-size:12px; color:var(--tx2); margin-top:2px;}
  .seg{display:flex; gap:6px; margin-bottom:8px;}
  .seg:last-child{margin-bottom:0;}
  .seg button{flex:1; padding:8px 0; font-size:13px; font-family:inherit; color:var(--tx);
    background:#fff; border:1px solid var(--line); border-radius:9px; cursor:pointer;}
  .seg button.on{background:var(--info-bg); color:var(--info); border-color:#a9cdf0; font-weight:600;}
  .seg select,.seg input{flex:1; padding:8px 10px; font-size:13px; font-family:inherit; color:var(--tx);
    background:#fff; border:1px solid var(--line); border-radius:9px; min-width:0;}
  .vtoggle button{font-size:14px; padding:9px 0;}
  .panel{background:#ececea; border-radius:14px; padding:10px; margin-bottom:10px;}
  .stats{display:flex; gap:6px; margin-bottom:10px;}
  .stat{flex:1; background:#ececea; border-radius:10px; padding:7px; text-align:center;}
  .stat .lbl{font-size:12px; color:var(--tx2);}
  .stat .num{font-size:19px; font-weight:600;}
  .legend{display:flex; gap:14px; justify-content:center; margin:6px 0 10px; font-size:12px; color:var(--tx2);}
  .legend i{font-size:13px; vertical-align:-1px;}
  /* list */
  .list{display:flex; flex-direction:column; gap:5px;}
  .row{background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .row .head{padding:9px 11px; display:flex; align-items:center; justify-content:space-between;
    cursor:pointer; border-right:3px solid var(--line2);}
  .row.avail .head{border-right-color:var(--avail-bd);}
  .row.hold .head{border-right-color:var(--hold-bd);}
  .row.sold .head{border-right-color:var(--sold-bd);}
  .ttl{font-size:15px; font-weight:600; line-height:1.3;}
  .meta{font-size:12px; color:var(--tx2);}
  .price{font-size:15px; font-weight:600; text-align:left; white-space:nowrap;}
  .pill{display:inline-block; margin-top:2px; font-size:11px; padding:2px 9px; border-radius:7px;}
  .pill.avail{background:var(--avail-bg); color:var(--avail);}
  .pill.hold{background:var(--hold-bg); color:var(--hold);}
  .pill.sold{background:var(--sold-bg); color:var(--sold);}
  .pill.none{background:var(--none-bg); color:var(--none-tx);}
  .cap{display:inline-block; font-size:10px; padding:0 6px; border-radius:6px;
    background:var(--info-bg); color:var(--info); margin-right:5px; vertical-align:1px;}
  .det{background:#f6f6f4; border-top:1px solid var(--line); padding:9px 12px; font-size:13px;}
  .det .dr{display:flex; justify-content:space-between; padding:3px 0;}
  .det .dr span:first-child{color:var(--tx2);}
  .det .dr span:last-child{font-weight:600;}
  /* plan */
  .sel{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 12px; margin-bottom:8px;}
  .plan{border:1px solid var(--line2); border-radius:8px 8px 0 0; overflow:hidden;}
  .floor{display:flex; align-items:stretch;}
  .floor+.floor, .ftop{border-top:1px solid var(--line);}
  .flabel{flex:0 0 26px; display:flex; align-items:center; justify-content:center;
    font-size:11px; color:var(--tx2); background:#ececea;}
  .frow{flex:1; display:flex; gap:2px; padding:2px; min-width:0;}
  .ucell{flex:1; min-width:0; cursor:pointer; border-radius:4px; padding:4px 1px; text-align:center; line-height:1.15;}
  .ucell .sz{font-size:13px; font-weight:600;}
  .ucell .un{font-size:9px; opacity:.85;}
  .roof{height:9px; background:#e3e3df; border:1px solid var(--line2); border-top:none; border-radius:0 0 4px 4px;}
  .msg{text-align:center; color:var(--tx2); padding:24px 10px; font-size:14px; line-height:1.7;}
  .foot{text-align:center; color:var(--tx3); font-size:11px; margin-top:16px; line-height:1.6;}
  .banner{background:var(--hold-bg); color:var(--hold); border-radius:10px; padding:8px 11px;
    font-size:12px; margin-bottom:10px; text-align:center;}
  .refresh{display:block; margin:14px auto 0; padding:7px 16px; font-size:13px; font-family:inherit;
    background:#fff; border:1px solid var(--line); border-radius:9px; color:var(--tx); cursor:pointer;}
  .hide{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div>
      <img class="logo-img" src="logo-davidson.png" alt="DAVIDSON" onload="this.style.display='inline';this.nextElementSibling.style.display='none';">
      <span class="brand-davidson">DAVIDSON</span>
    </div>
    <div class="brand-forever-chip">
      <img class="logo-img" src="logo-forever.png" alt="Forever" onload="this.style.display='inline';this.nextElementSibling.style.display='none';">
      <span class="brand-forever">Forever</span>
    </div>
  </div>
  <header>
    <h1>מחירון דירות — ראשון לציון</h1>
    <div class="sub" id="updated">טוען נתונים…</div>
  </header>

  <div id="banner"></div>

  <div class="seg vtoggle" id="viewSeg">
    <button data-v="plan" class="on">תרשים בניין</button>
    <button data-v="list">רשימה</button>
  </div>

  <!-- ============ תצוגת תרשים ============ -->
  <div id="planView">
    <div class="seg" id="planBldSeg">
      <button data-b="1" class="on">בוטיק 9 ק'</button>
      <button data-b="2">מגדל 20 ק'</button>
    </div>
    <div class="legend" style="flex-direction:column; gap:5px;">
      <div style="display:flex; gap:6px; align-items:center;">
        <span>פנוי — מילוי לפי גודל</span>
        <span id="sizeScale" style="display:inline-flex; height:11px; width:120px; border-radius:4px; overflow:hidden; border:1px solid var(--line);"></span>
        <span style="font-size:11px;">קטן→גדול</span>
      </div>
      <div style="display:flex; gap:14px; align-items:center;">
        <span><i class="ti ti-minus" style="color:var(--avail-bd)"></i> פנוי</span>
        <span><span style="display:inline-block;width:15px;height:15px;border:1px solid var(--hold-bd);border-radius:3px;vertical-align:-3px;background:linear-gradient(to top right,transparent 44%,var(--hold-bd) 44%,var(--hold-bd) 56%,transparent 56%),linear-gradient(to bottom right,transparent 44%,var(--hold-bd) 44%,var(--hold-bd) 56%,transparent 56%),var(--hold-bg);"></span> שמור</span>
        <span><span style="display:inline-block;width:15px;height:15px;border:1px solid var(--sold-bd);border-radius:3px;vertical-align:-3px;background:linear-gradient(to top right,transparent 44%,var(--sold-bd) 44%,var(--sold-bd) 56%,transparent 56%),linear-gradient(to bottom right,transparent 44%,var(--sold-bd) 44%,var(--sold-bd) 56%,transparent 56%),var(--sold-bg);"></span> נמכר</span>
      </div>
    </div>
    <div class="sel hide" id="sel"></div>
    <div id="plan"></div>
    <p class="foot">המספר בתא = שטח במ"ר · לחיצה על דירה לפרטים מלאים</p>
  </div>

  <!-- ============ תצוגת רשימה ============ -->
  <div id="listView" class="hide">
    <div class="panel">
      <div class="seg" id="listBldSeg">
        <button data-b="all" class="on">שני הבניינים</button>
        <button data-b="1">בוטיק 9 ק'</button>
        <button data-b="2">מגדל 20 ק'</button>
      </div>
      <div class="seg" id="statSeg">
        <button data-st="all" class="on">הכל</button>
        <button data-st="avail">פנוי</button>
        <button data-st="hold">שמור</button>
        <button data-st="sold">נמכר</button>
      </div>
      <div class="seg">
        <select id="rooms">
          <option value="all">כל החדרים</option>
          <option value="2">2 חדרים</option>
          <option value="3">3 חדרים</option>
          <option value="4">4 חדרים</option>
          <option value="5">5 חדרים</option>
        </select>
        <input id="q" placeholder="חיפוש מס' / טיפוס">
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="lbl">פנוי</div><div class="num" id="cAvail" style="color:var(--avail)">0</div></div>
      <div class="stat"><div class="lbl">שמור</div><div class="num" id="cHold" style="color:var(--hold)">0</div></div>
      <div class="stat"><div class="lbl">נמכר</div><div class="num" id="cSold" style="color:var(--sold)">0</div></div>
    </div>
    <div class="list" id="list"></div>
  </div>

  <button class="refresh" id="refreshBtn">רענון נתונים</button>
  <div class="foot" id="foot"></div>
</div>

<script>
/* ============ הגדרות — ערוך כאן בלבד ============ */
var SHEET_ID = "1sDH0j-gkiaqojtznY_FnIq8SHj0lzPAQVsRcBNuOM44";
var GID      = "815985993";
var BUILDING1_NAME = "בוטיק 9 קומות";
var BUILDING2_NAME = "מגדל 20 ק'";

/* מיפוי לפי שורת "מזהה לקלוד" בגיליון — לכל עמודה ID יציב, כך ששינוי/הוספת עמודות לא שובר.
   בניין 1: IDs 1..15  |  מגדל: IDs 101..116.  ערכי סטטוס: פנוי / שמור / תפוס */
var ID_ROW_LABEL = "מזהה";
var IDB1 = {floor:1, unit:2, type:3, dir:4, rooms:5, size:6, bal:7, pk:8,
            price:9, equity:10, law1:11, law2:12, taxS:13, taxI:14, status:15};
var IDB2 = {floor:101, ftype:102, unit:103, type:104, dir:105, rooms:106, size:107, bal:108, pk:109,
            price:110, equity:111, law1:112, law2:113, taxS:114, taxI:115, status:116};
/* גיבוי לפי מיקום קבוע, אם שורת המזהה חסרה */
var B1_FB = {floor:1, unit:2, type:3, dir:4, rooms:5, size:6, bal:7, pk:8, price:9, equity:10, law1:11, law2:12, taxS:13, taxI:14, status:15};
var B2_FB = {floor:21, ftype:22, unit:23, type:24, dir:25, rooms:26, size:27, bal:28, pk:29, price:30, equity:31, law1:32, law2:33, taxS:34, taxI:35, status:36};
/* ================================================ */

var GVIZ = "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:csv&gid="+GID;
var DATA = [], hasStatus=false;
var view="plan", planB=1, selId=null;
var listB="all", filter="all", open={};

/* ---------- פירוק הגיליון ---------- */
function parseCSV(text){
  var rows=[], row=[], cur="", q=false;
  for(var i=0;i<text.length;i++){
    var ch=text[i];
    if(q){ if(ch=='"'){ if(text[i+1]=='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else{ if(ch=='"') q=true; else if(ch==','){ row.push(cur); cur=""; }
      else if(ch=='\n'){ row.push(cur); rows.push(row); row=[]; cur=""; }
      else if(ch=='\r'){} else cur+=ch; }
  }
  if(cur.length||row.length){ row.push(cur); rows.push(row); }
  return rows;
}
function cell(r,i){ return (i!=null && r[i]!=null) ? String(r[i]).trim() : ""; }
function toNum(s){ var d=(s||"").replace(/[^\d]/g,""); return d?parseInt(d,10):0; }
function statusKey(s){
  s=(s||"").replace(/"/g,"").trim();
  if(s.indexOf("תפוס")>=0 || s.indexOf("נמכר")>=0) return "sold";
  if(s.indexOf("שמור")>=0 || s.indexOf("שריון")>=0) return "hold";
  if(s.indexOf("פנוי")>=0) return "avail";
  return null;
}
function extract(r, M, bldNum){
  var unit=cell(r,M.unit), price=toNum(cell(r,M.price));
  if(!/^\d+$/.test(unit) || price<100000) return null;
  var ft = M.ftype!=null ? cell(r,M.ftype) : "";
  return {
    bld:bldNum, floor:toNum(cell(r,M.floor)), unit:parseInt(unit,10),
    type:cell(r,M.type), dir:cell(r,M.dir), rooms:toNum(cell(r,M.rooms)),
    size:toNum(cell(r,M.size)), bal:toNum(cell(r,M.bal)), pk:toNum(cell(r,M.pk)),
    price:price, equity:toNum(cell(r,M.equity)), law1:toNum(cell(r,M.law1)),
    law2:toNum(cell(r,M.law2)), taxS:toNum(cell(r,M.taxS)), taxI:toNum(cell(r,M.taxI)),
    cap: ft.indexOf("קפסולה")>=0,
    status: M.status!=null ? statusKey(cell(r,M.status)) : null
  };
}
/* בונה id->עמודה משורת "מזהה לקלוד" */
function buildIdCol(rows){
  for(var i=0;i<rows.length;i++){
    if(cell(rows[i],0).indexOf(ID_ROW_LABEL)>=0){
      var map={};
      for(var j=0;j<rows[i].length;j++){ var v=cell(rows[i],j); if(/^\d+$/.test(v)) map[+v]=j; }
      return map;
    }
  }
  return null;
}
function resolveMap(idMap, id2col){
  var m={}; for(var k in idMap){ var c=id2col[idMap[k]]; m[k]=(c==null?null:c); } return m;
}
function colsOk(m){ return m && m.unit!=null && m.price!=null; }
function parseSheet(text){
  var rows=parseCSV(text), out=[];
  hasStatus=false;
  var id2col=buildIdCol(rows);
  var m1=id2col?resolveMap(IDB1,id2col):null;
  var m2=id2col?resolveMap(IDB2,id2col):null;
  if(!colsOk(m1)) m1=B1_FB;
  if(!colsOk(m2)) m2=B2_FB;
  for(var i=0;i<rows.length;i++){
    var a=extract(rows[i],m1,1); if(a){ out.push(a); if(a.status) hasStatus=true; }
    var b=extract(rows[i],m2,2); if(b){ out.push(b); if(b.status) hasStatus=true; }
  }
  var capFloors={};
  out.forEach(function(d){ if(d.cap) capFloors[d.bld+"-"+d.floor]=true; });
  out.forEach(function(d){ if(capFloors[d.bld+"-"+d.floor]) d.cap=true; });
  return out;
}

function nis(n){ return "₪"+Math.round(n).toLocaleString("he-IL"); }
var ST={avail:{lb:"פנוי"},hold:{lb:"שמור"},sold:{lb:"נמכר"}};
function clr(status){
  var k=status||"none";
  return {bg:"var(--"+k+"-bg)", bd:"var(--"+k+"-bd)", tx:"var(--"+(status||"none")+(status?"":"-tx")+")"};
}

/* צבע אחיד לפי גודל הדירה: כל גודל מקבל גוון קבוע, מסודר קטן→גדול (נמנע מאדום/כתום ששמורים לסטטוס) */
var SIZES=[], STBAR={avail:"#1d9e75", hold:"#ef9f27", sold:"#e24b4a"};
function sizeColor(sz){
  var n=SIZES.length, idx=SIZES.indexOf(sz);
  var h=90+(n>1?idx/(n-1):0)*230;
  return {bg:"hsl("+h+",55%,90%)", bd:"hsl("+h+",45%,72%)", tx:"hsl("+h+",42%,30%)"};
}
function buildSizeScale(){
  var el=document.getElementById("sizeScale"); if(!el) return;
  var stops=SIZES.map(function(s){return sizeColor(s).bg;});
  el.style.background = stops.length>1 ? "linear-gradient(90deg,"+stops.join(",")+")" : (stops[0]||"#eee");
}

/* ---------- תצוגת תרשים ---------- */
function pickUnit(id){
  selId=id;
  var d=DATA.filter(function(x){return x.bld+"-"+x.unit===id;})[0];
  if(!d){ return; }
  var c=clr(d.status), lb=d.status?ST[d.status].lb:"לא צוין";
  document.getElementById("sel").className="sel";
  document.getElementById("sel").innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">'
    +'<div style="min-width:0"><div style="font-size:16px;font-weight:600;">דירה '+d.unit+' · טיפוס '+d.type+(d.cap?' · קפסולה':'')+'</div>'
    +'<div class="meta" style="margin-top:2px;">קומה '+d.floor+' · '+d.rooms+' חד\' · '+d.size+' מ"ר · '+d.dir+'</div></div>'
    +'<div style="text-align:left;white-space:nowrap;"><div style="font-size:16px;font-weight:600;">'+nis(d.price)+'</div>'
    +'<span class="pill '+(d.status||"none")+'" style="margin-top:3px;">'+lb+'</span></div></div>'
    +'<div class="det" style="margin-top:8px;border-radius:8px;border-top:none;background:#f3f3f1;">'
    +dr("הון עצמי 20%",nis(d.equity))+dr('שכ"ט עו"ד 1.1%',nis(d.law1))
    +dr("מס רכישה — דירה יחידה", d.taxS?nis(d.taxS):"פטור")
    +dr("מס רכישה — להשקעה",nis(d.taxI))+'</div>';
  renderPlan();
  document.getElementById("sel").scrollIntoView({behavior:"smooth",block:"nearest"});
}
function renderPlan(){
  var rows=DATA.filter(function(d){return d.bld===planB;});
  if(!rows.length){ document.getElementById("plan").innerHTML='<div class="msg">אין נתונים לבניין זה</div>'; return; }
  var floors=rows.map(function(d){return d.floor;}).filter(function(v,i,a){return a.indexOf(v)===i;}).sort(function(a,b){return b-a;});
  var html='<div class="plan">';
  floors.forEach(function(f,idx){
    var units=rows.filter(function(d){return d.floor===f;}).sort(function(a,b){return a.unit-b.unit;});
    html+='<div class="floor'+(idx?'':' ftop')+'">';
    html+='<div class="flabel">'+f+'</div><div class="frow">';
    units.forEach(function(d){
      var on=(selId===d.bld+"-"+d.unit), st=d.status, bgStyle, bdColor, txColor;
      if(st==="hold" || st==="sold"){
        /* דירה שמורה/תפוסה: מילוי מלא בצבע הסטטוס + X אלכסוני בולט */
        var fill=(st==="hold")?"var(--hold-bg)":"var(--sold-bg)";
        var line=(st==="hold")?"var(--hold-bd)":"var(--sold-bd)";
        txColor=(st==="hold")?"var(--hold)":"var(--sold)"; bdColor=line;
        bgStyle="background:"
          +"linear-gradient(to top right,transparent calc(50% - 1.5px),"+line+" calc(50% - 1.5px),"+line+" calc(50% + 1.5px),transparent calc(50% + 1.5px)),"
          +"linear-gradient(to bottom right,transparent calc(50% - 1.5px),"+line+" calc(50% - 1.5px),"+line+" calc(50% + 1.5px),transparent calc(50% + 1.5px)),"
          +fill+";";
      } else {
        var sc=sizeColor(d.size), bar=st?STBAR[st]:"#d6d6d2";
        bgStyle="background:"+sc.bg+";border-bottom:4px solid "+bar+";"; bdColor=sc.bd; txColor=sc.tx;
      }
      html+='<div class="ucell" onclick="pickUnit(\''+d.bld+'-'+d.unit+'\')" '
        +'style="'+bgStyle+'border:1px solid '+bdColor+';'+(on?'box-shadow:0 0 0 2px var(--info);':'')+'">'
        +'<div class="sz" style="color:'+txColor+';">'+d.size+'</div>'
        +'<div class="un" style="color:'+txColor+'">'+d.unit+(d.cap?'·ק':'')+'</div></div>';
    });
    html+='</div></div>';
  });
  html+='</div><div class="roof"></div>';
  document.getElementById("plan").innerHTML=html;
}

/* ---------- תצוגת רשימה ---------- */
function renderList(){
  var rooms=document.getElementById("rooms").value;
  var query=document.getElementById("q").value.trim().toLowerCase();
  var scope=DATA.filter(function(d){return listB=="all"||String(d.bld)==listB;});
  document.getElementById("cAvail").textContent=scope.filter(function(d){return d.status=="avail";}).length;
  document.getElementById("cHold").textContent =scope.filter(function(d){return d.status=="hold";}).length;
  document.getElementById("cSold").textContent =scope.filter(function(d){return d.status=="sold";}).length;
  var rows=scope.filter(function(d){
    if(filter!="all" && d.status!=filter) return false;
    if(rooms!="all" && String(d.rooms)!=rooms) return false;
    if(query && (d.unit+" "+d.type).toLowerCase().indexOf(query)<0) return false;
    return true;
  });
  var list=document.getElementById("list");
  if(!rows.length){ list.innerHTML='<div class="msg">אין דירות שמתאימות לסינון</div>'; return; }
  list.innerHTML=rows.map(function(d){
    var id=d.bld+"-"+d.unit, stk=d.status||"none";
    var pill=d.status?('<span class="pill '+stk+'">'+ST[d.status].lb+'</span>'):'<span class="pill none">—</span>';
    var bn=d.bld==1?BUILDING1_NAME:BUILDING2_NAME, cap=d.cap?'<span class="cap">קפסולה</span>':'';
    var head='<div class="head" onclick="togRow(\''+id+'\')">'
      +'<div style="min-width:0"><div class="ttl">דירה '+d.unit+' · '+d.type+cap+'</div>'
      +'<div class="meta">'+bn+' · ק.'+d.floor+' · '+d.rooms+' חד\' · '+d.size+' מ"ר · '+d.dir+'</div></div>'
      +'<div><div class="price">'+nis(d.price)+'</div>'+pill+'</div></div>';
    var det='';
    if(open[id]){
      det='<div class="det">'+dr("מרפסת",d.bal+' מ"ר')+dr("חניות",d.pk)
        +dr("הון עצמי 20%",nis(d.equity))+dr('שכ"ט עו"ד 1.1%',nis(d.law1))
        +dr('שכ"ט עו"ד תשלום ראשון 0.35%',nis(d.law2))
        +dr("מס רכישה — דירה יחידה", d.taxS?nis(d.taxS):"פטור")
        +dr("מס רכישה — להשקעה",nis(d.taxI))+'</div>';
    }
    return '<div class="row '+stk+'">'+head+det+'</div>';
  }).join("");
}
function dr(k,v){ return '<div class="dr"><span>'+k+'</span><span>'+v+'</span></div>'; }
function togRow(id){ open[id]=!open[id]; renderList(); }

function renderActive(){ if(view=="plan") renderPlan(); else renderList(); }

/* ---------- מתגים ---------- */
function bindSeg(segId,setter){
  document.getElementById(segId).addEventListener("click",function(e){
    var b=e.target.closest("button"); if(!b) return;
    [].forEach.call(this.querySelectorAll("button"),function(x){x.classList.remove("on");});
    b.classList.add("on"); setter(b);
  });
}
bindSeg("viewSeg",function(b){
  view=b.getAttribute("data-v");
  document.getElementById("planView").className = view=="plan"?"":"hide";
  document.getElementById("listView").className = view=="list"?"":"hide";
  renderActive();
});
bindSeg("planBldSeg",function(b){ planB=+b.getAttribute("data-b"); selId=null; document.getElementById("sel").className="sel hide"; renderPlan(); });
bindSeg("listBldSeg",function(b){ listB=b.getAttribute("data-b"); renderList(); });
bindSeg("statSeg",function(b){ filter=b.getAttribute("data-st"); renderList(); });
document.getElementById("rooms").addEventListener("change",renderList);
document.getElementById("q").addEventListener("input",renderList);
document.getElementById("refreshBtn").addEventListener("click",load);

/* ---------- טעינה ---------- */
function load(){
  document.getElementById("updated").textContent="טוען נתונים…";
  fetch(GVIZ+"&_="+(new Date().getTime()))
    .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); })
    .then(function(t){
      DATA=parseSheet(t);
      if(!DATA.length) throw new Error("לא זוהו שורות דירה");
      SIZES=DATA.map(function(d){return d.size;}).filter(function(v,i,a){return a.indexOf(v)===i;}).sort(function(a,b){return a-b;});
      buildSizeScale();
      var now=new Date();
      document.getElementById("updated").textContent="עודכן "+now.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})+" · "+DATA.length+" דירות";
      document.getElementById("banner").innerHTML = hasStatus ? "" :
        '<div class="banner">להצגת פנוי/שמור/נמכר — מלאו את עמודת הסטטוס בגיליון (בניין 1: עמודה P · מגדל: עמודה AF).</div>';
      document.getElementById("foot").innerHTML='נתונים חיים מתוך הגיליון של דנה וחופית · צפייה בלבד';
      renderActive();
    })
    .catch(function(e){
      document.getElementById("updated").textContent="שגיאה בטעינה";
      var m='<div class="msg">לא הצלחנו לטעון את הנתונים.<br>ודאו שהגיליון משותף כ"כל מי שיש לו הקישור — צופה".<br><small>'+e.message+'</small></div>';
      document.getElementById("plan").innerHTML=m; document.getElementById("list").innerHTML=m;
    });
}
load();
document.addEventListener("visibilitychange",function(){ if(!document.hidden) load(); });
</script>
